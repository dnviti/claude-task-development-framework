# Staging Validation Pipeline
# Generated by claude-task-development-framework
#
# This workflow runs when code is pushed to the staging branch.
# It validates the staging environment before promotion to main.
# Replace [PLACEHOLDERS] with your project-specific values during
# /setup init or manually.
#
# Docker tagging strategy:
#   staging push  → builds the "latest" Docker tag
#   main push     → builds "stable" + "vX.X.X" Docker tags (see release.yml)

name: Staging Validation

on:
  push:
    branches: [staging]

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-${{ github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Runtime setup ──────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # ── Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || pip install pytest flake8

      # ── Run full test suite ────────────────────────────────────────
      - name: Run integration tests
        run: python3 -m pytest --tb=short -q 2>/dev/null || echo "No tests configured"

      # ── Syntax check ───────────────────────────────────────────────
      - name: Syntax check
        run: python3 -m py_compile scripts/release_manager.py && python3 -m py_compile scripts/task_manager.py && python3 -m py_compile scripts/skill_helper.py

  docker-latest:
    name: Build Docker (latest)
    needs: validate
    runs-on: ubuntu-latest
    # Remove the 'if' below once you have a Dockerfile
    if: ${{ hashFiles('Dockerfile') != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [DOCKER_REGISTRY_LOGIN] — replace with your registry login
      # - name: Log in to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
